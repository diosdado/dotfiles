
<!DOCTYPE html>
<html>
<head>


<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />


<title>$title$</title>
$for(header-includes)$
$header-includes$
$endfor$


<style>
.main-container {
  box-sizing: border-box;
  min-width: 200px;
  max-width: 980px;
  margin: 0 auto;
  padding: 45px;
}

.toc-container {
    columns: 4 auto;
}

@media (max-width: 767px) {
  .main-container {
     padding: 15px;
  }
}



</style>




</head>
<body class="markdown-body">
    <div class="main-container">
        $if(toc)$
        <h1>Table of contents</h1>
        <div class="toc-container">
        $toc$
        </div>
        $endif$

        $body$
    </div>
</body>
</html>
