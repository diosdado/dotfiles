
# Keyboard shortcuts
# -------------------------------------------------------------------------------------------------

# reload config
unbind r
bind r source-file ~/.tmux.conf

# tmux help
unbind /
bind / list-keys

# change prefix to ctrl+a to avoid collissions with remote tmux sessions
unbind C-a
set-option -g prefix C-a
bind-key C-a send-prefix

# show pane numbers
bind -r q display-panes

# cycle sessions
bind -n M-j switch-client -p
bind -n M-k switch-client -n

# syncronize panes
bind -n M-y run-shell "~/.scripts/tmux/sync-panes.sh"
bind -n ¥ run-shell "~/.scripts/tmux/sync-panes.sh" # alt+y
bind -r y run-shell "~/.scripts/tmux/sync-panes.sh"

# switch betwen current and previous selected session
bind -n M-l switch-client -l

# switch windows
bind -n C-Tab select-window -n
bind -n C-BTab select-window -p

bind -n √ copy-mode # alt+v
bind -n ç run-shell "tmux neww glow -w 0 -s dracula -p ~/.scripts/complete-cheatsheet.md" # alt+c

# zoom pane
bind -n M-z resize-pane -Z

# change layout
unbind v
unbind h
bind v run-shell "tmux select-layout even-vertical ; ~/.scripts/tmux/tmux-resize-main.sh"
bind h run-shell "tmux select-layout even-horizontal ; ~/.scripts/tmux/tmux-resize-main.sh"


# Settings
# -------------------------------------------------------------------------------------------------

# set terminal to 256 colors
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# move status bar to the top
set -g status-position top
set -g status-right "#{?pane_synchronized, #[bg=red]SYNC ON#[default],} %H:%M %d-%b-%y"

# allow sending escape sequences directly to the terminal emulator
set -g allow-passthrough on

# faster update interval for the status bar
set -g status-interval 1

# enable mouse
setw -g mouse on

# navigate copy mode as tmux
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# custom styles
set -g pane-border-lines double


# Tmux plugins
# -------------------------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'


# Dracula theme plugins
# -------------------------------------------------------------------------------------------------

# available icons: `hostname` (full hostname), `session`, `shortname` (short name), `smiley`, `window`, or any character.
set -g @dracula-show-left-icon session

# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, playerctl, kubernetes-context, synchronize-panes
set -g @dracula-plugins "synchronize-panes ssh-session tmux-ram-usage"
set -g @dracula-show-powerline true
set -g @dracula-refresh-rate .5
set -g @dracula-show-ssh-session-port true
set -g @dracula-border-contrast true

# available colors: white, gray, dark_gray, light_purple, dark_purple, cyan, green, orange, red, pink, yellow
set -g @dracula-ssh-session-colors "cyan dark_gray"
set -g @dracula-tmux-ram-usage-colors "dark_gray white"
set -g @dracula-synchronize-panes-colors "red dark_gray"
set -g @dracula-ram-usage-colors "gray white"


# Start plugin manager
# -------------------------------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'





