
# Keyboard shortcuts
# -------------------------------------------------------------------------------------------------

# remove some default shortcuts
unbind r
unbind /
unbind C-a
bind -n F12 run-shell "tmux neww ~/.scripts/tmux/tmux-cht.sh"
unbind -n M-p


bind r source-file ~/.tmux.conf
bind / list-keys

set-option -g prefix C-a
bind-key C-a send-prefix




bind -r q display-panes

# cycle sessions
bind -n M-j switch-client -p
bind -n M-k switch-client -n

# switch betwen current and previous selected session
bind -n M-l switch-client -l

# switch windows
bind -n C-Tab select-window -n
bind -n C-BTab select-window -p

bind -n M-y set-window-option synchronize-panes

bind -n F12 run-shell "tmux neww ~/.scripts/tmux/tmux-cht.sh"
bind -n F11 run-shell "tmux neww glow -w 0 -s dracula -p ~/.scripts/complete-cheatsheet.md"
bind -n F10 run-shell "tmux neww cava"




bind -n M-z resize-pane -Z      # zoom pane

# bind v select-layout even-vertical
# bind h select-layout even-horizontal

# Settings
# -------------------------------------------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g status-position top
setw -g mouse on
set -g allow-passthrough

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
# setw -g modekeys vi

set -g status-interval 1


bind -n M-y run-shell "~/.scripts/tmux/sync-panes.sh"
bind -r y run-shell "~/.scripts/tmux/sync-panes.sh"




# Tmux plugins
# -------------------------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'



# Dracula theme plugins
# -------------------------------------------------------------------------------------------------
set -g @dracula-plugins "synchronize-panes   git"
set -g @dracula-show-powerline true
set -g @dracula-refresh-rate 1
set -g @dracula-fixed-location "Mexico City"
set -g @dracula-show-fahrenheit false
set -g @dracula-show-ssh-session-port false
set -g @dracula-border-contrast true

# it can accept `hostname` (full hostname), `session`, `shortname` (short name), `smiley`, `window`, or any character.
set -g @dracula-show-left-icon session
set -g @dracula-show-location false
# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, playerctl, kubernetes-context, synchronize-panes
# available colors: white, gray, dark_gray, light_purple, dark_purple, cyan, green, orange, red, pink, yellow
set -g @dracula-ssh-session-colors "cyan dark_gray"
set -g @dracula-ssh-git-colors "cyan dark_gray"
set -g @dracula-cpu-usage-colors "orange dark_gray"
set -g @dracula-synchronize-panes-colors "light_purple dark_gray"
set -g @dracula-ram-usage-colors "gray white"


run '~/.tmux/plugins/tpm/tpm'





